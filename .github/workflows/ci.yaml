name: CI Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      POETRY_HOME: "/opt/poetry"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install poetry
      run: |
        python3 -m venv $POETRY_HOME
        $POETRY_HOME/bin/pip install poetry==1.8.4
        $POETRY_HOME/bin/poetry --version
    - name: Install ffmpeg 7
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        ffmpeg -version
    - name: Install package (including video extra for multimodal tests)
      run: $POETRY_HOME/bin/poetry install --extras video
    - name: Run tests with coverage
      run: $POETRY_HOME/bin/poetry run pytest --cov=voyageai --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=90
    - name: Upload coverage report
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml