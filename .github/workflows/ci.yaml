name: CI Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      # Run one Python version at a time: this job runs the full suite against
      # the live API (incl. token-heavy voyage-multimodal-3.5), and running the
      # whole matrix in parallel exceeds the project's per-minute token (TPM)
      # rate limit, turning real assertions into spurious RateLimitError failures.
      max-parallel: 1
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      POETRY_HOME: "/opt/poetry"
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install poetry
      run: |
        python3 -m venv $POETRY_HOME
        $POETRY_HOME/bin/pip install poetry==1.8.4
        $POETRY_HOME/bin/poetry --version
    - name: Install ffmpeg 7
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        ffmpeg -version
    - name: Install package (including video extra for multimodal tests)
      run: $POETRY_HOME/bin/poetry install --extras video
    - name: Run tests with coverage
      run: $POETRY_HOME/bin/poetry run pytest --cov=voyageai --cov-report=term-missing --cov-report=xml:coverage.xml
    - name: Enforce coverage threshold
      # Gate once, on a single canonical version, instead of redundantly on
      # every matrix entry. The full suite (including the live-API integration
      # tests, which run because VOYAGE_API_KEY is set above) measures ~93% here;
      # the gate is set to 90% to leave headroom so a single flaky API test or a
      # small uncovered addition doesn't red the build.
      if: matrix.python-version == '3.12'
      run: $POETRY_HOME/bin/poetry run coverage report --fail-under=90
    - name: Upload coverage report
      # always() so the report is still uploaded when the threshold gate fails,
      # which is exactly when it's most useful for diagnosis.
      if: always() && matrix.python-version == '3.12'
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
      with:
        name: coverage-report
        path: coverage.xml