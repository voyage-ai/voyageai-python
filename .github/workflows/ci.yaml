name: CI Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

env:
  POETRY_HOME: "/opt/poetry"

jobs:
  # Unit tests without local dependencies (tests import error handling)
  unit-tests-no-local-deps:
    name: Unit Tests (no local deps)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install poetry
      run: |
        python3 -m venv $POETRY_HOME
        $POETRY_HOME/bin/pip install poetry==1.8.4
        $POETRY_HOME/bin/poetry --version
    - name: Install ffmpeg 7
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        ffmpeg -version
    - name: Install package (with video extra, without local extras)
      run: $POETRY_HOME/bin/poetry install --extras video
    - name: Run unit tests (no API key, no local deps)
      run: $POETRY_HOME/bin/poetry run pytest tests/test_client_local.py tests/test_client_local_async.py -v

  # Local model tests with local dependencies but no API key
  local-model-tests:
    name: Local Model Tests
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install poetry
      run: |
        python3 -m venv $POETRY_HOME
        $POETRY_HOME/bin/pip install poetry==1.8.4
        $POETRY_HOME/bin/poetry --version
    - name: Install ffmpeg 7
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        ffmpeg -version
    - name: Install OpenBLAS (needed for scipy build on 3.13+)
      run: sudo apt-get install -y libopenblas-dev
    - name: Install package with all extras
      run: $POETRY_HOME/bin/poetry install --extras "video local"
    - name: Run local model tests (no API key)
      run: $POETRY_HOME/bin/poetry run pytest tests/test_client_local.py tests/test_client_local_async.py -v

  # Full integration tests with API key and all dependencies
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install poetry
      run: |
        python3 -m venv $POETRY_HOME
        $POETRY_HOME/bin/pip install poetry==1.8.4
        $POETRY_HOME/bin/poetry --version
    - name: Install ffmpeg 7
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        ffmpeg -version
    - name: Install OpenBLAS (needed for scipy build on 3.13+)
      run: sudo apt-get install -y libopenblas-dev
    - name: Install package with all extras
      run: $POETRY_HOME/bin/poetry install --extras "video local"
    - name: Run all tests
      run: $POETRY_HOME/bin/poetry run pytest
